name: PR CI

on:
  pull_request:
    branches: [production] # main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

jobs:
  lint-and-build:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.10.0 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run lint
        run: yarn lint

      - name: Run tsc
        run: yarn tsc

      - name: Run tests
        run: yarn test --run

      - name: Run build
        run: yarn build

      - name: Run Cloudflare preview smoke
        run: |
          set -euo pipefail

          yarn preview --port 8788 > /tmp/dowin-preview.log 2>&1 &
          preview_pid=$!

          cleanup() {
            kill "$preview_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:8788/ >/tmp/dowin-root.html; then
              exit 0
            fi

            if ! kill -0 "$preview_pid" 2>/dev/null; then
              cat /tmp/dowin-preview.log
              exit 1
            fi

            sleep 2
          done

          cat /tmp/dowin-preview.log
          exit 1
