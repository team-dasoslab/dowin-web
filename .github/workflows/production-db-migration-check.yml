name: Production DB Migration Check

on:
  pull_request:
    branches: [production]
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: production-db-migration-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-migration:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_MIGRATION_CHECK_DATABASE: ${{ vars.D1_MIGRATION_CHECK_DATABASE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.10.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Validate migration check configuration
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$D1_MIGRATION_CHECK_DATABASE"

      - name: Apply migrations to validation D1 database
        run: yarn wrangler d1 migrations apply "$D1_MIGRATION_CHECK_DATABASE" --remote
