components:
  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        nickname: { type: string }
        isFirstLogin: { type: boolean }
        locale: { type: string, enum: [ko, en] }

    RecoveryAccount:
      type: object
      required: [customId, nickname]
      properties:
        customId: { type: string }
        nickname: { type: string }

    AdminUser:
      type: object
      required: [id, loginId, displayName, status, mfaEnabled]
      properties:
        id: { type: integer }
        loginId: { type: string }
        displayName: { type: string }
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, DISABLED]
        mfaEnabled:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
          nullable: true

    AdminSessionProfile:
      type: object
      required: [adminUser, roles]
      properties:
        adminUser:
          $ref: "#/components/schemas/AdminUser"
        roles:
          type: array
          items:
            type: string
            enum: [SUPPORT_ADMIN, BILLING_ADMIN, RECOVERY_ADMIN, SYSTEM_ADMIN]

    AdminLoginRequest:
      type: object
      required: [loginId, password]
      properties:
        loginId:
          type: string
          minLength: 3
          maxLength: 100
        password:
          type: string
          format: password

    AdminContactInquiryUpdateRequest:
      type: object
      required: [changeReason]
      properties:
        status:
          type: string
          enum: [RECEIVED, IN_PROGRESS, RESOLVED]
        answerSummary:
          type: string
          nullable: true
          maxLength: 5000
        changeReason:
          type: string
          minLength: 1
          maxLength: 500

    AdminBillingWorkspaceSummary:
      type: object
      required:
        [
          workspaceId,
          workspaceName,
          planCode,
          billingStatus,
          entitlementSource,
          cancelAtPeriodEnd,
          recentRefundCount,
          recentRevokedCount,
          requiresManualReview,
        ]
      properties:
        workspaceId: { type: integer }
        workspaceName: { type: string }
        planCode:
          type: string
          enum: [FREE, STANDARD]
        billingStatus:
          type: string
          enum: [NONE, ACTIVE, CANCELED, EXPIRED, REVOKED]
        entitlementSource:
          type: string
          enum: [POLAR, MANUAL_GRANT, PARTNER, INTERNAL_TEST]
          nullable: true
        provider:
          type: string
          enum: [POLAR]
          nullable: true
        currentPeriodEnd:
          type: string
          format: date-time
          nullable: true
        cancelAtPeriodEnd:
          type: boolean
