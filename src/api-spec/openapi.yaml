openapi: 3.0.3
info:
  title: Dowin API
  description: Dowin(가중목) 서비스 API 명세서
  version: 0.1.0
servers:
  - url: /api
    description: Local development server

paths:
  /auth/login:
    post:
      summary: 로그인
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customId, password]
              properties:
                customId: { type: string, example: john123 }
                password: { type: string, format: password, example: user }
      responses:
        "200":
          description: 로그인 성공
          headers:
            Set-Cookie:
              schema:
                {
                  type: string,
                  example: "dowin_sid=abc; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=2592000",
                }
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/User" }
        "401":
          description: 아이디 또는 비밀번호 불일치
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "429":
          description: 로그인 시도 제한 초과
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/signup:
    post:
      summary: 회원가입
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customId, nickname, password]
              properties:
                customId: { type: string, example: john123 }
                nickname: { type: string, example: 존 }
                password:
                  { type: string, format: password, example: "newSecurePass1!" }
      responses:
        "201":
          description: 회원가입 성공
          headers:
            Set-Cookie:
              schema:
                {
                  type: string,
                  example: "dowin_sid=abc; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=2592000",
                }
          content:
            application/json:
              schema:
                type: object
                required: [user, recoveryCodes]
                properties:
                  user: { $ref: "#/components/schemas/User" }
                  recoveryCodes:
                    type: array
                    items: { type: string }
                    description: 가입 직후 1회 노출되는 복원 코드 목록
        "409":
          description: 이미 사용 중인 아이디
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/logout:
    post:
      summary: 로그아웃
      tags: [Auth]
      responses:
        "204":
          description: 로그아웃 성공
          headers:
            Set-Cookie:
              schema:
                {
                  type: string,
                  example: "dowin_sid=; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=0",
                }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/password:
    put:
      summary: 비밀번호 변경
      tags: [Auth]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string, format: password }
                newPassword: { type: string, format: password }
      responses:
        "200":
          description: 비밀번호 변경 성공
          headers:
            Set-Cookie:
              schema:
                {
                  type: string,
                  example: "dowin_sid=; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=0",
                }
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    { type: string, example: "비밀번호가 변경되었습니다." }
        "400":
          description: 현재 비밀번호 불일치
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 비밀번호 유효성 규칙 미충족
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/recovery-codes/verify:
    post:
      summary: 복원코드로 계정 조회
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recoveryCode]
              properties:
                recoveryCode:
                  type: string
                  description: 대소문자/하이픈/공백 무시, 10자리 복원코드
                  example: 6JYS-B959TK
      responses:
        "200":
          description: 복원코드 검증 성공
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user: { $ref: "#/components/schemas/RecoveryAccount" }
        "404":
          description: 유효하지 않은 복원코드
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/auth/login:
    post:
      summary: 운영자 로그인
      tags: [AdminAuth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: 운영자 로그인 성공
          headers:
            Set-Cookie:
              schema:
                {
                  type: string,
                  example: "dowin_admin_sid=abc; HttpOnly; Secure; SameSite=Strict; Path=/; Max-Age=14400",
                }
          content:
            application/json:
              schema:
                type: object
                required: [adminUser, roles]
                properties:
                  adminUser: { $ref: "#/components/schemas/AdminUser" }
                  roles:
                    type: array
                    items:
                      type: string
                      enum:
                        [
                          SUPPORT_ADMIN,
                          BILLING_ADMIN,
                          RECOVERY_ADMIN,
                          SYSTEM_ADMIN,
                        ]
        "401":
          description: 아이디 또는 비밀번호 불일치
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/auth/logout:
    post:
      summary: 운영자 로그아웃
      tags: [AdminAuth]
      security: [{ adminSessionCookie: [] }]
      responses:
        "204":
          description: 운영자 로그아웃 성공
          headers:
            Set-Cookie:
              schema:
                {
                  type: string,
                  example: "dowin_admin_sid=; HttpOnly; Secure; SameSite=Strict; Path=/; Max-Age=0",
                }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /admin/auth/me:
    get:
      summary: 현재 운영자 세션 조회
      tags: [AdminAuth]
      security: [{ adminSessionCookie: [] }]
      responses:
        "200":
          description: 운영자 세션 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSessionProfile"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /admin/contact-inquiries:
    get:
      summary: 운영자 문의 목록 조회
      tags: [AdminContact]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [RECEIVED, IN_PROGRESS, RESOLVED]
        - name: category
          in: query
          schema:
            type: string
            enum: [GENERAL, BILLING, BUG_OR_ACCOUNT]
        - name: userId
          in: query
          schema:
            type: integer
        - name: workspaceId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: 운영자 문의 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactInquirySummary"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/contact-inquiries/{id}:
    get:
      summary: 운영자 문의 상세 조회
      tags: [AdminContact]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: 운영자 문의 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactInquiryDetail"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: 문의를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    patch:
      summary: 운영자 문의 상태/답변 수정
      tags: [AdminContact]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminContactInquiryUpdateRequest"
      responses:
        "200":
          description: 운영자 문의 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactInquiryDetail"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: 문의를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/billing/workspaces:
    get:
      summary: 운영자 billing 워크스페이스 목록 조회
      tags: [AdminBilling]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: integer
        - name: workspaceName
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 운영자 billing 워크스페이스 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminBillingWorkspaceSummary"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/billing/provider-products:
    get:
      summary: 운영자 billing provider product 매핑 목록 조회
      tags: [AdminBilling]
      security: [{ adminSessionCookie: [] }]
      responses:
        "200":
          description: 운영자 billing provider product 매핑 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminBillingProviderProduct"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    post:
      summary: 운영자 billing provider product 매핑 upsert
      tags: [AdminBilling]
      security: [{ adminSessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBillingProviderProductUpsertRequest"
      responses:
        "200":
          description: 운영자 billing provider product 매핑 upsert 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBillingProviderProduct"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/billing/workspaces/{workspaceId}:
    get:
      summary: 운영자 billing 워크스페이스 상세 조회
      tags: [AdminBilling]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 운영자 billing 워크스페이스 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBillingWorkspaceDetail"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: 워크스페이스를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/billing/workspaces/{workspaceId}/manual-override:
    post:
      summary: 운영자 billing 수동 보정
      tags: [AdminBilling]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBillingManualOverrideRequest"
      responses:
        "200":
          description: 운영자 billing 수동 보정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBillingWorkspaceDetail"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: 워크스페이스를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/billing/workspaces/{workspaceId}/sync-status:
    post:
      summary: 운영자 billing 상태 단건 동기화
      tags: [AdminBilling]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 운영자 billing 상태 단건 동기화 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBillingWorkspaceDetail"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: 워크스페이스를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/marketing-invite-codes:
    get:
      summary: 운영자 프로모션 코드 초대코드 목록 조회
      tags: [AdminMarketing]
      security: [{ adminSessionCookie: [] }]
      responses:
        "200":
          description: 프로모션 코드 초대코드 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketingInviteCodeSummary"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    post:
      summary: 운영자 프로모션 코드 초대코드 생성
      tags: [AdminMarketing]
      security: [{ adminSessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketingInviteCodeCreateRequest"
      responses:
        "201":
          description: 프로모션 코드 초대코드 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingInviteCodeDetail"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: 이미 사용 중인 코드
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/marketing-invite-codes/{id}:
    get:
      summary: 운영자 프로모션 코드 초대코드 상세 조회
      tags: [AdminMarketing]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: 프로모션 코드 초대코드 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingInviteCodeDetail"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: 초대코드를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    patch:
      summary: 운영자 프로모션 코드 초대코드 수정
      tags: [AdminMarketing]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketingInviteCodeUpdateRequest"
      responses:
        "200":
          description: 프로모션 코드 초대코드 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingInviteCodeDetail"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: 초대코드를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: 사용 횟수보다 낮은 한도 설정
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/marketing-invite-redemptions/{id}/feedback:
    patch:
      summary: 운영자 프로모션 코드 피드백 상태/메모 수정
      tags: [AdminMarketing]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketingInviteRedemptionFeedbackUpdateRequest"
      responses:
        "200":
          description: 피드백 상태/메모 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketingInviteRedemption"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: 사용 이력을 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/password/by-recovery-code:
    put:
      summary: 복원코드로 비밀번호 재설정
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
