        createdByAdminUserId: { type: integer }
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
        entitlementDurationDays:
          type: integer
          minimum: 1
          nullable: true

    MarketingInviteRedemption:
      type: object
