              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      summary: 팀 대시보드 사용자 메모 작성
      tags: [Dashboard]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/DashboardTeamMemoCreateRequest" }
      responses:
        "201":
          description: 생성 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardTeamMemo" }
        "404":
          description: 워크스페이스 또는 대상 사용자를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /workspaces/{workspaceId}/dashboard/team/memos/{memoId}/resolve:
    patch:
      summary: 팀 대시보드 사용자 메모 완료 상태 변경
      tags: [Dashboard]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema: { type: string }
        - name: memoId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/DashboardTeamMemoResolveRequest" }
      responses:
        "200":
          description: 변경 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardTeamMemo" }
        "403":
          description: 메모 완료 상태를 변경할 권한이 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: 메모를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /workspaces/{workspaceId}/dashboard/team/memos/{memoId}:
    delete:
      summary: 팀 대시보드 사용자 메모 삭제
      tags: [Dashboard]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema: { type: string }
        - name: memoId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: 삭제 성공
        "403":
          description: 메모를 삭제할 권한이 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: 메모를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

components:
  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        nickname: { type: string }
        isFirstLogin: { type: boolean }
        locale: { type: string, enum: [ko, en] }

    TeamCheckinSettings:
      type: object
      required:
        - enabled
        - includeAdminAsMember
        - triggerNoWeeklyLogEnabled
        - triggerSlowStartEnabled
        - dailyMemberLimit
        - dailyWorkspaceLimit
      properties:
        enabled: { type: boolean }
        includeAdminAsMember: { type: boolean }
        triggerNoWeeklyLogEnabled: { type: boolean }
        triggerSlowStartEnabled: { type: boolean }
        dailyMemberLimit: { type: integer, minimum: 1, maximum: 10 }
        dailyWorkspaceLimit: { type: integer, minimum: 1, maximum: 500 }

    TeamCheckinResponse:
      type: object
      properties:
        id: { type: string }
        responseType:
          type: string
          enum: [LOG_NOW, SNOOZE_TODAY, BLOCKED, ADJUSTMENT_REQUESTED]
        note: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    TeamCheckinResponseCreateRequest:
      type: object
      required: [responseType]
      properties:
        responseType:
          type: string
          enum: [LOG_NOW, SNOOZE_TODAY, BLOCKED, ADJUSTMENT_REQUESTED]
        note: { type: string, nullable: true, maxLength: 500 }

    TeamCheckinInboxResponse:
      type: object
      properties:
        items:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/TeamCheckinInboxCheckinItem"
              - $ref: "#/components/schemas/TeamCheckinInboxProposalItem"
        nextCursor: { type: string, nullable: true }

    TeamCheckinInboxCheckinItem:
      type: object
      properties:
        type: { type: string, enum: [CHECKIN] }
        id: { type: string }
        workspaceId: { type: string }
        leadMeasureId: { type: integer }
        leadMeasureName: { type: string }
        reasonCode: { type: string, enum: [NO_WEEKLY_LOG, SLOW_WEEKLY_START] }
        periodStart: { type: string, format: date }
        periodEnd: { type: string, format: date }
        sentAt: { type: string, format: date-time, nullable: true }
        response:
          oneOf:
            - $ref: "#/components/schemas/TeamCheckinResponse"
          nullable: true

    TeamCheckinInboxProposalItem:
      type: object
      properties:
        type: { type: string, enum: [ADJUSTMENT_PROPOSAL] }
        id: { type: string }
        sourceCheckinId: { type: string }
        leadMeasureId: { type: integer }
        leadMeasureName: { type: string }
        actionType:
          type: string
          enum:
            [CHANGE_TARGET_COUNT, ARCHIVE_ACTION_ITEM, REPLACE_ACTION_ITEM]
        payload: { type: object, additionalProperties: true }
        leaderNote: { type: string, nullable: true }
        status:
          type: string
          enum: [PROPOSED, ACCEPTED, DECLINED, EXPIRED, CANCELED, APPLY_FAILED]
        expiresAt: { type: string, format: date-time }

    TeamCheckinReportResponse:
      type: object
      properties:
        workspaceId: { type: string }
        weekStart: { type: string, format: date }
        weekEnd: { type: string, format: date }
        summary:
          type: object
          properties:
            sentCount: { type: integer }
            recipientCount: { type: integer }
            respondedCount: { type: integer }
            oneTapResponseRate: { type: number }
            resumedWithin24hCount: { type: integer }
            resumedWithin24hRate: { type: number }
            adjustmentSignalCount: { type: integer }
            proposalAcceptanceRate: { type: number }
        attentionItems:
          type: array
          items:
            type: object
            properties:
              responseId: { type: string, nullable: true }
              checkinId: { type: string }
              memberUserId: { type: integer }
              memberNickname: { type: string }
              leadMeasureId: { type: integer }
              leadMeasureName: { type: string }
              signalType:
                type: string
                enum: [BLOCKED, ADJUSTMENT_REQUESTED]
                nullable: true
              note: { type: string, nullable: true }
              createdAt: { type: string, format: date-time }
              openProposalId: { type: string, nullable: true }
              isResolved: { type: boolean }
              resolvedAt: { type: string, format: date-time, nullable: true }
              resolvedProposal:
                type: object
                nullable: true
                properties:
                  actionType: { type: string }
                  leaderNote: { type: string, nullable: true }
                  payloadJson: { type: string }
                  status: { type: string }
                  createdAt: { type: string, format: date-time }
        activity:
          type: array
          items:
            type: object
            properties:
              type: { type: string, enum: [CHECKIN_SENT, CHECKIN_RESPONDED] }
              checkinId: { type: string }
              memberNickname: { type: string }
              leadMeasureName: { type: string }
              createdAt: { type: string, format: date-time }

    TeamCheckinAdjustmentProposal:
      type: object
      properties:
        id: { type: string }
        actionType:
          type: string
          enum:
            [CHANGE_TARGET_COUNT, ARCHIVE_ACTION_ITEM, REPLACE_ACTION_ITEM]
        payload: { type: object, additionalProperties: true }
        leaderNote: { type: string, nullable: true }
        status:
          type: string
          enum: [PROPOSED, ACCEPTED, DECLINED, EXPIRED, CANCELED, APPLY_FAILED]
        expiresAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    TeamCheckinAdjustmentProposalCreateRequest:
      type: object
      required: [sourceResponseId, actionType, payload]
      properties:
        sourceResponseId: { type: string }
        actionType:
          type: string
          enum:
            [CHANGE_TARGET_COUNT, ARCHIVE_ACTION_ITEM, REPLACE_ACTION_ITEM]
        payload: { type: object, additionalProperties: true }
        leaderNote: { type: string, nullable: true, maxLength: 500 }

    TeamCheckinAdjustmentProposalDeclineRequest:
      type: object
      properties:
        reason: { type: string, enum: [KEEP_CURRENT_GOAL, NOT_NOW, OTHER] }

    TeamCheckinAdjustmentProposalApplyResponse:
      type: object
      properties:
        status: { type: string, enum: [ACCEPTED] }
        appliedAt: { type: string, format: date-time }
        result: { type: object, additionalProperties: true }

    RecoveryAccount:
      type: object
      required: [customId, nickname]
      properties:
        customId: { type: string }
        nickname: { type: string }

    AdminUser:
      type: object
      required: [id, loginId, displayName, status, mfaEnabled]
      properties:
        id: { type: integer }
        loginId: { type: string }
        displayName: { type: string }
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, DISABLED]
        mfaEnabled:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
          nullable: true

    AdminSessionProfile:
      type: object
      required: [adminUser, roles]
      properties:
        adminUser:
          $ref: "#/components/schemas/AdminUser"
        roles:
          type: array
          items:
            type: string
            enum: [SUPPORT_ADMIN, BILLING_ADMIN, RECOVERY_ADMIN, SYSTEM_ADMIN]

    AdminLoginRequest:
      type: object
      required: [loginId, password]
      properties:
        loginId:
          type: string
          minLength: 3
          maxLength: 100
        password:
          type: string
          format: password

    AdminContactInquiryUpdateRequest:
      type: object
      required: [changeReason]
      properties:
        status:
          type: string
          enum: [RECEIVED, IN_PROGRESS, RESOLVED]
        answerSummary:
          type: string
          nullable: true
          maxLength: 5000
        changeReason:
          type: string
          minLength: 1
          maxLength: 500

    AdminBillingWorkspaceSummary:
      type: object
      required:
        [
          workspaceId,
          workspaceName,
          planCode,
          billingStatus,
          entitlementSource,
          cancelAtPeriodEnd,
          recentRefundCount,
          recentRevokedCount,
          requiresManualReview,
          purchasedSeatCount,
        ]
      properties:
        workspaceId: { type: integer }
        workspaceName: { type: string }
        planCode:
          type: string
          enum: [BASIC, FREE, STANDARD]
        billingStatus:
          type: string
          enum: [NONE, ACTIVE, CANCELED, EXPIRED, REVOKED]
        entitlementSource:
          type: string
          enum: [POLAR, MANUAL_GRANT, PARTNER, INTERNAL_TEST, BETA_PROMOTIONAL_GRANT]
          nullable: true
        provider:
          type: string
          enum: [POLAR]
          nullable: true
        currentPeriodEnd:
          type: string
          format: date-time
          nullable: true
        cancelAtPeriodEnd:
          type: boolean
        billingOwnerUserId:
          type: integer
          nullable: true
        customerKey:
          type: string
          nullable: true
        subscriptionKey:
          type: string
          nullable: true
        billingCustomerExternalRef:
          type: string
          nullable: true
        lastEventOccurredAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
        recentRefundCount:
          type: integer
          minimum: 0
        recentRevokedCount:
          type: integer
          minimum: 0
        requiresManualReview:
          type: boolean
        purchasedSeatCount:
          type: integer
          minimum: 0
          nullable: true
          description: 워크스페이스의 현재 Basic seat entitlement 수

    AdminBillingProviderProduct:
      type: object
      required:
        [
          id,
          provider,
          environment,
          planCode,
          providerProductId,
          isActive,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: integer }
        provider:
          type: string
          enum: [POLAR]
        environment:
          type: string
          enum: [sandbox, production]
        planCode:
          type: string
          enum: [BASIC, STANDARD]
        providerProductId:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AdminBillingProviderProductUpsertRequest:
      type: object
      required: [provider, environment, planCode, providerProductId, changeReason]
      properties:
        provider:
          type: string
          enum: [POLAR]
        environment:
          type: string
          enum: [sandbox, production]
        planCode:
          type: string
          enum: [BASIC, STANDARD]
        providerProductId:
          type: string
          minLength: 1
          maxLength: 255
        isActive:
          type: boolean
        changeReason:
          type: string
          minLength: 1
          maxLength: 500

    AdminBillingEvent:
      type: object
      required:
        [id, provider, eventType, occurredAt, recordedAt, status, source]
      properties:
        id: { type: integer }
        provider:
          type: string
          enum: [POLAR]
        providerEventId:
          type: string
          nullable: true
        eventType:
          type: string
        subscriptionKey:
          type: string
          nullable: true
        customerKey:
          type: string
          nullable: true
        occurredAt:
          type: string
          format: date-time
        recordedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [ACCEPTED, IGNORED, FAILED]
        failureReason:
          type: string
          nullable: true
        source:
          type: string
          enum: [WEBHOOK, RECONCILIATION, MANUAL_CORRECTION]

    AdminBillingWorkspaceDetail:
      allOf:
        - $ref: "#/components/schemas/AdminBillingWorkspaceSummary"
        - type: object
          required: [events]
          properties:
            events:
              type: array
              items:
                $ref: "#/components/schemas/AdminBillingEvent"

    AdminBillingManualOverrideRequest:
      type: object
      required: [planCode, billingStatus, changeReason]
      properties:
        planCode:
          type: string
          enum: [BASIC, FREE, STANDARD]
        billingStatus:
          type: string
          enum: [NONE, ACTIVE, CANCELED, EXPIRED, REVOKED]
        entitlementSource:
          type: string
          enum: [POLAR, MANUAL_GRANT, PARTNER, INTERNAL_TEST, BETA_PROMOTIONAL_GRANT]
          nullable: true
        customerKey:
          type: string
          nullable: true
          maxLength: 255
        subscriptionKey:
          type: string
          nullable: true
          maxLength: 255
        currentPeriodEnd:
          type: string
          format: date-time
          nullable: true
        cancelAtPeriodEnd:
          type: boolean
        billingOwnerUserId:
          type: integer
          nullable: true
        purchasedSeatCount:
          type: integer
          minimum: 0
          maximum: 999
          nullable: true
          description: BASIC 수동 보정 시 지급할 seat 수. 생략하면 현재 멤버 수 이상으로 자동 설정한다.
        changeReason:
          type: string
          minLength: 1
          maxLength: 500

    MarketingInviteCodeStatus:
      type: string
      enum: [ACTIVE, INACTIVE]

    MarketingInviteFeedbackStatus:
      type: string
      enum: [NOT_REQUESTED, REQUESTED, RECEIVED, DROPPED]

    MarketingInviteCodeSummary:
      type: object
      required:
