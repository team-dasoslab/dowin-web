openapi: 3.0.3
info:
  title: Dowin API
  description: Dowin(가중목) 서비스 API 명세서
  version: 0.1.0
servers:
  - url: /api
    description: Local development server

paths:
  /auth/login:
    post:
      summary: 로그인
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customId, password]
              properties:
                customId: { type: string, example: john123 }
                password: { type: string, format: password, example: user }
      responses:
        "200":
          description: 로그인 성공
          headers:
            Set-Cookie:
              schema:
                {
                  type: string,
                  example: "dowin_sid=abc; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=2592000",
                }
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/User" }
        "401":
          description: 아이디 또는 비밀번호 불일치
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "429":
          description: 로그인 시도 제한 초과
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/signup:
    post:
      summary: 회원가입
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customId, nickname, password]
              properties:
                customId: { type: string, example: john123 }
                nickname: { type: string, example: 존 }
                password:
                  { type: string, format: password, example: "newSecurePass1!" }
      responses:
        "201":
          description: 회원가입 성공
          headers:
            Set-Cookie:
              schema:
                {
                  type: string,
                  example: "dowin_sid=abc; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=2592000",
                }
          content:
            application/json:
              schema:
                type: object
                required: [user, recoveryCodes]
                properties:
                  user: { $ref: "#/components/schemas/User" }
                  recoveryCodes:
                    type: array
                    description: 가입 직후 1회 노출되는 복원 코드 목록
                    minItems: 8
                    maxItems: 8
                    items:
                      type: string
                      example: 6JYSB959TK
        "409":
          description: 이미 사용 중인 아이디
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/logout:
    post:
      summary: 로그아웃
      tags: [Auth]
      responses:
        "204":
          description: 로그아웃 성공
          headers:
            Set-Cookie:
              schema:
                {
                  type: string,
                  example: "dowin_sid=; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=0",
                }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/password:
    put:
      summary: 비밀번호 변경
      tags: [Auth]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string, format: password }
                newPassword: { type: string, format: password }
      responses:
        "200":
          description: 비밀번호 변경 성공
          headers:
            Set-Cookie:
              schema:
                {
                  type: string,
                  example: "dowin_sid=; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=0",
                }
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    { type: string, example: "비밀번호가 변경되었습니다." }
        "400":
          description: 현재 비밀번호 불일치
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 비밀번호 유효성 규칙 미충족
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/recovery-codes/verify:
    post:
      summary: 복원코드로 계정 조회
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recoveryCode]
              properties:
                recoveryCode:
                  type: string
                  description: 대소문자/하이픈/공백 무시, 10자리 복원코드
                  example: 6JYS-B959TK
      responses:
        "200":
          description: 복원코드 검증 성공
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user: { $ref: "#/components/schemas/RecoveryAccount" }
        "404":
          description: 유효하지 않은 복원코드
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/auth/login:
    post:
      summary: 운영자 로그인
      tags: [AdminAuth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: 운영자 로그인 성공
          headers:
            Set-Cookie:
              schema:
                {
                  type: string,
                  example: "dowin_admin_sid=abc; HttpOnly; Secure; SameSite=Strict; Path=/; Max-Age=14400",
                }
          content:
            application/json:
              schema:
                type: object
                required: [adminUser, roles]
                properties:
                  adminUser: { $ref: "#/components/schemas/AdminUser" }
                  roles:
                    type: array
                    items:
                      type: string
                      enum:
                        [
                          SUPPORT_ADMIN,
                          BILLING_ADMIN,
                          RECOVERY_ADMIN,
                          SYSTEM_ADMIN,
                        ]
        "401":
          description: 아이디 또는 비밀번호 불일치
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/auth/logout:
    post:
      summary: 운영자 로그아웃
      tags: [AdminAuth]
      security: [{ adminSessionCookie: [] }]
      responses:
        "204":
          description: 운영자 로그아웃 성공
          headers:
            Set-Cookie:
              schema:
                {
                  type: string,
                  example: "dowin_admin_sid=; HttpOnly; Secure; SameSite=Strict; Path=/; Max-Age=0",
                }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /admin/auth/me:
    get:
      summary: 현재 운영자 세션 조회
      tags: [AdminAuth]
      security: [{ adminSessionCookie: [] }]
      responses:
        "200":
          description: 운영자 세션 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSessionProfile"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /admin/contact-inquiries:
    get:
      summary: 운영자 문의 목록 조회
      tags: [AdminContact]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [RECEIVED, IN_PROGRESS, RESOLVED]
        - name: category
          in: query
          schema:
            type: string
            enum: [GENERAL, BILLING, BUG_OR_ACCOUNT]
        - name: userId
          in: query
          schema:
            type: integer
        - name: workspaceId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 운영자 문의 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactInquirySummary"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/contact-inquiries/{id}:
    get:
      summary: 운영자 문의 상세 조회
      tags: [AdminContact]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: 운영자 문의 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactInquiryDetail"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: 문의를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    patch:
      summary: 운영자 문의 상태/답변 수정
      tags: [AdminContact]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminContactInquiryUpdateRequest"
      responses:
        "200":
          description: 운영자 문의 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactInquiryDetail"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: 문의를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/billing/workspaces:
    get:
      summary: 운영자 billing 워크스페이스 목록 조회
      tags: [AdminBilling]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: string
        - name: workspaceName
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 운영자 billing 워크스페이스 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminBillingWorkspaceSummary"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/billing/workspaces/{workspaceId}:
    get:
      summary: 운영자 billing 워크스페이스 상세 조회
      tags: [AdminBilling]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 운영자 billing 워크스페이스 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBillingWorkspaceDetail"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: 워크스페이스를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /admin/billing/workspaces/{workspaceId}/manual-override:
    post:
      summary: 운영자 billing 수동 보정
      tags: [AdminBilling]
      security: [{ adminSessionCookie: [] }]
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBillingManualOverrideRequest"
      responses:
        "200":
          description: 운영자 billing 수동 보정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBillingWorkspaceDetail"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: 운영 권한 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: 워크스페이스를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/password/by-recovery-code:
    put:
      summary: 복원코드로 비밀번호 재설정
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recoveryCode, newPassword]
              properties:
                recoveryCode:
                  type: string
                  description: 대소문자/하이픈/공백 무시, 10자리 복원코드
                  example: 6JYS-B959TK
                newPassword:
                  type: string
                  format: password
                  example: newSecurePass1!
      responses:
        "200":
          description: 비밀번호 재설정 성공
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: 비밀번호가 변경되었습니다.
        "404":
          description: 유효하지 않은 복원코드
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /users/me:
    get:
      summary: 내 프로필 조회
      tags: [Profile]
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserProfile" }
        "404":
          description: 사용자를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    put:
      summary: 내 프로필 변경
      tags: [Profile]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserProfileUpdateRequest" }
      responses:
        "200":
          description: 변경 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserProfile" }
        "422":
          description: 닉네임 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: 사용자를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    delete:
      summary: 계정 탈퇴
      tags: [Profile]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserDeleteRequest" }
      responses:
        "204":
          description: 탈퇴 성공
        "400":
          description: 현재 비밀번호 불일치
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: 유일한 ADMIN은 계정 탈퇴 불가
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /contact-inquiries:
    get:
      summary: 내 문의 목록 조회
      tags: [Contact]
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: 문의 목록 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactInquirySummary"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      summary: 문의 접수 생성
      tags: [Contact]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInquiryCreateRequest"
      responses:
        "201":
          description: 문의 접수 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactInquiryDetail"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /contact-inquiries/{id}:
    get:
      summary: 내 문의 상세 조회
      tags: [Contact]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: 문의 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactInquiryDetail"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          description: 문의를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /push/settings:
    get:
      summary: 내 일일 알림 설정 조회
      tags: [Notification]
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserNotificationSettings" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    put:
      summary: 내 일일 알림 설정 변경
      tags: [Notification]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserNotificationSettingsUpdateRequest"
      responses:
        "200":
          description: 변경 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserNotificationSettings" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /notifications/devices:
    post:
      summary: 현재 기기 알림 토큰 등록
      tags: [Notification]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevicePushTokenRegisterRequest"
      responses:
        "200":
          description: 등록 성공
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success: { type: boolean, example: true }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    delete:
      summary: 현재 기기 알림 토큰 비활성화
      tags: [Notification]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevicePushTokenDisableRequest"
      responses:
        "200":
          description: 비활성화 성공
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success: { type: boolean, example: true }
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "422":
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /workspaces:
    get:
      summary: 내 워크스페이스 목록 조회
      tags: [Workspace]
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WorkspaceListItem" }
        "401":
          $ref: "#/components/responses/UnauthorizedError"

    post:
